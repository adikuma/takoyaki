appId: com.adikuma.takoyaki
productName: Takoyaki
artifactName: Takoyaki-${version}.${ext}
directories:
  output: release
  buildResources: build
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: true
files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/*.{md,txt,map}"
