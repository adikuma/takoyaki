appId: com.adikuma.takoyaki
productName: Takoyaki
artifactName: Takoyaki-${version}.${ext}
directories:
  output: release
  buildResources: build
win:
  target: nsis
  icon: build/icon.ico
publish:
  provider: github
  owner: adikuma
  repo: takoyaki
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: true
files:
  - out/**/*
  - node_modules/**/*
  - '!node_modules/**/*.{md,txt,map}'
